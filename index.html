import java.util.ArrayList;
import java.util.List;

// ==========================================
// 1. SINGLETON PATTERN
// ==========================================
class ConfigurationManager {
    private ConfigurationManager() {
        System.out.println("Configuration Manager Initialized");
    }
    private static class SingletonHelper {
        private static final ConfigurationManager INSTANCE = new ConfigurationManager();
    }
    public static ConfigurationManager getInstance() {
        return SingletonHelper.INSTANCE;
    }
    public String getApplicationName() {
        return "Student Management System";
    }
    public String getVersion() {
        return "Version 1.0";
    }
    public String getDatabaseURL() {
        return "jdbc:mysql://localhost:3306/studentdb";
    }
}

// ==========================================
// 2. FACTORY PATTERN
// ==========================================
interface Notification {
    void send();
}
class EmailNotification implements Notification {
    public void send() {
        System.out.println("Sending Email Notification...");
    }
}
class SMSNotification implements Notification {
    public void send() {
        System.out.println("Sending SMS Notification...");
    }
}
class PushNotification implements Notification {
    public void send() {
        System.out.println("Sending Push Notification...");
    }
}
class NotificationFactory {
    public static Notification createNotification(String type) {
        if (type.equalsIgnoreCase("EMAIL")) return new EmailNotification();
        if (type.equalsIgnoreCase("SMS")) return new SMSNotification();
        if (type.equalsIgnoreCase("PUSH")) return new PushNotification();
        return null;
    }
}

// ==========================================
// 3. OBSERVER PATTERN
// ==========================================
interface Observer {
    void update(String message);
}
interface Subject {
    void registerObserver(Observer o);
    void removeObserver(Observer o);
    void notifyObservers();
}
class NewsAgency implements Subject {
    private List observers = new ArrayList<>();
    private String news;
    public void registerObserver(Observer o) {
        observers.add(o);
    }
    public void removeObserver(Observer o) {
        observers.remove(o);
    }
    public void notifyObservers() {
        for (Observer observer : observers) {
            observer.update(news);
        }
    }
    public void setNews(String news) {
        this.news = news;
        notifyObservers();
    }
}
class MobileUser implements Observer {
    private String name;
    public MobileUser(String name) {
        this.name = name;
    }
    public void update(String message) {
        System.out.println(name + " received on mobile: " + message);
    }
}
class TVChannel implements Observer {
    private String channelName;
    public TVChannel(String channelName) {
        this.channelName = channelName;
    }
    public void update(String message) {
        System.out.println(channelName + " broadcasts: " + message);
    }
}

// ==========================================
// 4. MODEL-VIEW-CONTROLLER (MVC) PATTERN
// ==========================================
class Student {
    private String name;
    private int age;
    public Student(String name, int age) {
        this.name = name;
        this.age = age;
    }
    public String getName() {
        return name;
    }
    public int getAge() {
        return age;
    }
    public void setName(String name) {
        this.name = name;
    }
    public void setAge(int age) {
        this.age = age;
    }
}
class StudentView {
    public void displayStudentDetails(String name, int age) {
        System.out.println("Student Details:");
        System.out.println("Name: " + name);
        System.out.println("Age: " + age);
    }
}
class StudentController {
    private Student model;
    private StudentView view;
    public StudentController(Student model, StudentView view) {
        this.model = model;
        this.view = view;
    }
    public void setStudentName(String name) {
        model.setName(name);
    }
    public void setStudentAge(int age) {
        model.setAge(age);
    }
    public void updateView() {
        view.displayStudentDetails(model.getName(), model.getAge());
    }
}
```

import java.util.ArrayList;
import java.util.List;

// ==========================================
// 1. SINGLETON PATTERN
// ==========================================
class AppConfigManager {
    private AppConfigManager() {
        System.out.println("Food App Config Initialized");
    }
    private static class SingletonHelper {
        private static final AppConfigManager INSTANCE = new AppConfigManager();
    }
    public static AppConfigManager getInstance() {
        return SingletonHelper.INSTANCE;
    }
    public String getAppName() {
        return "FoodDeliveryPro";
    }
    public String getBaseDeliveryFee() {
        return "50.00";
    }
}

// ==========================================
// 2. FACTORY PATTERN
// ==========================================
interface Payment {
    void processPayment();
}
class CreditCardPayment implements Payment {
    public void processPayment() {
        System.out.println("Processing Credit Card Payment...");
    }
}
class EWalletPayment implements Payment {
    public void processPayment() {
        System.out.println("Processing E-Wallet Payment...");
    }
}
class CashOnDelivery implements Payment {
    public void processPayment() {
        System.out.println("Preparing for Cash on Delivery...");
    }
}
class PaymentFactory {
    public static Payment createPayment(String type) {
        if (type.equalsIgnoreCase("CREDIT_CARD")) return new CreditCardPayment();
        if (type.equalsIgnoreCase("EWALLET")) return new EWalletPayment();
        if (type.equalsIgnoreCase("COD")) return new CashOnDelivery();
        return null;
    }
}

// ==========================================
// 3. OBSERVER PATTERN
// ==========================================
interface OrderObserver {
    void update(String status);
}
interface OrderSubject {
    void registerObserver(OrderObserver o);
    void removeObserver(OrderObserver o);
    void notifyObservers();
}
class OrderTracker implements OrderSubject {
    private List observers = new ArrayList<>();
    private String orderStatus;
    public void registerObserver(OrderObserver o) {
        observers.add(o);
    }
    public void removeObserver(OrderObserver o) {
        observers.remove(o);
    }
    public void notifyObservers() {
        for (OrderObserver observer : observers) {
            observer.update(orderStatus);
        }
    }
    public void setStatus(String status) {
        this.orderStatus = status;
        notifyObservers();
    }
}
class CustomerApp implements OrderObserver {
    private String customerName;
    public CustomerApp(String name) {
        this.customerName = name;
    }
    public void update(String status) {
        System.out.println(customerName + "'s App: Order is " + status);
    }
}
class RestaurantDashboard implements OrderObserver {
    private String restoName;
    public RestaurantDashboard(String name) {
        this.restoName = name;
    }
    public void update(String status) {
        System.out.println(restoName + " Dashboard: Customer order is " + status);
    }
}

// ==========================================
// 4. MODEL-VIEW-CONTROLLER (MVC) PATTERN
// ==========================================
class FoodItem {
    private String name;
    private double price;
    public FoodItem(String name, double price) {
        this.name = name;
        this.price = price;
    }
    public String getName() {
        return name;
    }
    public double getPrice() {
        return price;
    }
    public void setName(String name) {
        this.name = name;
    }
    public void setPrice(double price) {
        this.price = price;
    }
}
class FoodItemView {
    public void printItem(String name, double price) {
        System.out.println("Menu Item: " + name + " | Price: P" + price);
    }
}
class FoodItemController {
    private FoodItem model;
    private FoodItemView view;
    public FoodItemController(FoodItem model, FoodItemView view) {
        this.model = model;
        this.view = view;
    }
    public void setItemName(String name) {
        model.setName(name);
    }
    public void setItemPrice(double price) {
        model.setPrice(price);
    }
    public void updateView() {
        view.printItem(model.getName(), model.getPrice());
    }
}
```

### Answer Key
1. B (The private constructor of a Singleton runs the very first time getInstance() is called, printing the initialization message before the fee is requested 2-4.)
2. A (Even though getInstance() is called twice, the Singleton guarantees the instance is only created once, so "Food App Config Initialized" only prints a single time 2-4.)
3. A (The Factory Method uses .equalsIgnoreCase(), so the mixed case "eWallet" successfully instantiates and returns an EWalletPayment object 8, 9.)
4. C ("DEBIT_CARD" is not a defined type in the Factory, so it returns null. The if statement catches the null and prints the fallback message 8, 9.)
5. B (Objects are created, but .processPayment() is called on p2 first, meaning the Credit Card message prints before the COD message 8, 9.)
6. A (Both observers are registered before the status is updated, so both receive the "Preparing" message in the order they were added 13-15.)
7. B ("Received" is set before the customer is registered to the Subject, so the customer only gets notified about "Out for Delivery" 13-15.)

    <script>
        let currentAssessment = 1;
        let assessments = { 1: null, 2: null };
        let userAnswers = {};

        function parseMarkdown(rawText) {
            const data = { codebase: '', questions: [] };
            
            // Extract codebase
            const codeMatch = rawText.match(/### The Unified Base Code.*?\n`java\n([\s\S]*?)\n`\n/);
            if (codeMatch) data.codebase = codeMatch[1].trim();

            // Extract questions
            const qPattern = /\*\*Question (\d+)\*\*\n`java\n([\s\S]*?)\n`\n([A-D]\)[\s\S]*?)(?=\*\*Question|\*\*\* ### Answer Key)/g;
            let match;
            while ((match = qPattern.exec(rawText)) !== null) {
                const id = parseInt(match[1]);
                const code = match[2].trim();
                const optionsRaw = match[3].trim();
                
                const options = {};
                const optPattern = /([A-D])\) (.*?)(?=[A-D]\)|$)/g;
                const normalizedOptions = optionsRaw.replace(/\n/g, ' ');
                let optMatch;
                while ((optMatch = optPattern.exec(normalizedOptions)) !== null) {
                    options[optMatch[1]] = optMatch[2].trim();
                }
                
                data.questions.push({ id, code, options, answer: '', explanation: '' });
            }

            // Extract answers
            const ansMatch = rawText.match(/### Answer Key[\s\S]*?\n(1\.[\s\S]*?)$/);
            if (ansMatch) {
                const lines = ansMatch[1].split('\n');
                lines.forEach(line => {
                    const m = line.trim().match(/^(\d+)\.\s+([A-D])\s+\((.*?)\)$/);
                    if (m) {
                        const qId = parseInt(m[1]);
                        const q = data.questions.find(q => q.id === qId);
                        if (q) {
                            q.answer = m[2];
                            q.explanation = m[3];
                        }
                    }
                });
            }
            return data;
        }

        function init() {
            assessments[1] = parseMarkdown(document.getElementById('raw-a1').textContent);
            assessments[2] = parseMarkdown(document.getElementById('raw-a2').textContent);
            renderAssessment(currentAssessment);
        }

        function switchAssessment(num) {
            currentAssessment = num;
            document.querySelectorAll('.tab').forEach((el, idx) => {
                el.classList.toggle('active', idx + 1 === num);
            });
            userAnswers = {};
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'inline-block';
            renderAssessment(num);
        }

        function renderAssessment(num) {
            const data = assessments[num];
            document.getElementById('base-code-display').textContent = data.codebase;
            
            const qContainer = document.getElementById('questions-display');
            qContainer.innerHTML = '';
            
            data.questions.forEach((q, idx) => {
                const qEl = document.createElement('div');
                qEl.className = 'question';
                qEl.id = 'question-' + q.id;
                
                let optionsHtml = '';
                for (const [letter, text] of Object.entries(q.options)) {
                    optionsHtml += \
                        <label class="option" onclick="selectOption(\, '\')">
                            <input type="radio" name="q\" value="\">
                            <span><b>\)</b> \</span>
                        </label>
                    \;
                }
                
                qEl.innerHTML = \
                    <h3>Question \</h3>
                    <pre><code>\</code></pre>
                    <div class="options">\</div>
                    <div class="feedback" id="feedback-\"></div>
                \;
                qContainer.appendChild(qEl);
            });
            
            window.scrollTo(0, 0);
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function selectOption(qId, letter) {
            userAnswers[qId] = letter;
            const qEl = document.getElementById('question-' + qId);
            qEl.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
            qEl.querySelector(\input[value="\"]\).closest('.option').classList.add('selected');
        }

        function submitQuiz() {
            const data = assessments[currentAssessment];
            let score = 0;
            
            if (Object.keys(userAnswers).length < data.questions.length) {
                if(!confirm("You haven't answered all questions. Submit anyway?")) return;
            }
            
            data.questions.forEach(q => {
                const fb = document.getElementById('feedback-' + q.id);
                fb.style.display = 'block';
                fb.className = 'feedback';
                
                const selected = userAnswers[q.id];
                if (selected === q.answer) {
                    score++;
                    fb.classList.add('correct');
                    fb.innerHTML = '<strong>Correct!</strong> ' + escapeHtml(q.explanation);
                } else if (selected) {
                    fb.classList.add('wrong');
                    let expText = escapeHtml(q.explanation);
                    fb.innerHTML = '<strong>Incorrect.</strong> Here is what happens in this code: <br>' + expText;
                } else {
                    fb.classList.add('wrong');
                    fb.innerHTML = '<strong>Unanswered.</strong>';
                }
            });
            
            document.getElementById('quiz-container').style.display = 'none';
            document.getElementById('result-panel').style.display = 'block';
            document.getElementById('score-text').textContent = \\/\\;
            
            let summaryHtml = '<h3>Summary</h3><ul>';
            data.questions.forEach(q => {
                const isCorrect = userAnswers[q.id] === q.answer;
                summaryHtml += \<li style="color: \; margin-bottom: 0.5rem;">
                    Question \: \
                </li>\;
            });
            summaryHtml += '</ul>';
            document.getElementById('result-summary').innerHTML = summaryHtml;
            window.scrollTo(0, 0);
        }

        function retryQuiz() {
            userAnswers = {};
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'inline-block';
            renderAssessment(currentAssessment);
        }

        function viewAnswers() {
            document.getElementById('result-panel').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            document.getElementById('submit-btn').style.display = 'none';
            
            document.querySelectorAll('input[type="radio"]').forEach(el => el.disabled = true);
        }

        window.onload = init;
    </script>
